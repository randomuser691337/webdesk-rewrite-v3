<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
</body>

<script>
    const FSDebug = false;
    const UIDebug = false;
    const WFS = new Worker('./wfs.js');
    const ops = {};
    let opNum = 0;

    const FS = {
        noBoiler: async function (data) {
            return new Promise((resolve, reject) => {
                opNum++;
                ops[opNum] = { resolve, reject };
                WFS.postMessage({ opNum, data });
            });
        },
        init: async function () { return await FS.noBoiler({ opType: "init" }); },
        write: async function (path, content, type) { return await FS.noBoiler({ opType: "write", path, content, type }); },
        read: async function (path) { return await FS.noBoiler({ opType: "read", path }); },
        rm: async function (path) { return await FS.noBoiler({ opType: "rm", path }); },
        mkdir: async function (path) { return await FS.noBoiler({ opType: "mkdir", path }); },
        ls: async function (path) { return await FS.noBoiler({ opType: "ls", path }); }
    }

    WFS.addEventListener("message", (event) => {
        // Set up variables
        if (FSDebug === true) console.log(event);
        const data = event.data;
        const promise = ops[data.opNum];
        // Resolve request
        if (!promise) return;
        promise.resolve(data.data);
        delete ops[data.opNum];
    });

    async function startWD() {
        async function loadScript(path) {
            const init = await FS.read(path);
            const script = document.createElement("script");
            script.textContent = init.content;
            document.body.appendChild(script);
        }

        await loadScript("/system/init.js");
        await loadScript("/system/ui.js");
        await loadScript("/system/sandbox/sandbox_creator.js");

        const styleCont = await FS.read("/system/style.css");
        const style = document.createElement("style");
        style.textContent = styleCont.content;
        document.body.appendChild(style);

        await createSandbox();
        await createSandbox();
    }

    (async function () {
        const initFS = await FS.init();
        if (initFS === false) {
            document.body.innerHTML = `<h2>Browser unsupported</h2><p>Update your browser or download Chrome to use WebDesk.</p>`;
        }

        async function writeScriptToFS(path) {
            const init = await fetch("desk" + path);
            const txt = await init.text();
            await FS.write(path, txt);
        }

        await writeScriptToFS("/system/init.js");
        await writeScriptToFS("/system/sandbox/sandbox.html");
        await writeScriptToFS("/system/ui.js");
        await writeScriptToFS("/system/sandbox/sandbox_creator.js");
        await writeScriptToFS("/apps/RenderTest.app/index.js");
        await writeScriptToFS("/system/style.css");

        await startWD();
    })();
</script>
