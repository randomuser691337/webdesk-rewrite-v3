<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
</body>

<script>
    const ops = {};
    let opNum = 0;
    let frameID = null;

    const FS = {
        _noBoiler: async function (data) {
            return new Promise((resolve, reject) => {
                opNum++;
                ops[opNum] = { resolve, reject };
                window.parent.postMessage({ "frameID": frameID, "op": "FS", content: { opNum, data } }, "*");
            });
        },
        init: async function () { return await FS._noBoiler({ opType: "init" }); },
        write: async function (path, content, type) { return await FS._noBoiler({ opType: "write", path, content, type }); },
        read: async function (path, content, type) { return await FS._noBoiler({ opType: "read", path }); },
        rm: async function (path, content, type) { return await FS._noBoiler({ opType: "rm", path }); },
        mkdir: async function (path) { return await FS._noBoiler({ opType: "mkdir", path }); },
        ls: async function (path) { return await FS._noBoiler({ opType: "ls", path }); }
    }

    const UIOps = {};
    const eventListeners = {};
    let UINum = 0;
    let toPost = [];
    let yield = false;

    function addToPost(item) {
        toPost.push(item);
    }

    function sendEventsNow() {
        if (toPost.length !== 0) {
            if (yield === false) {
                yield = true;
                const pending = toPost;
                toPost = [];
                window.parent.postMessage({ "frameID": frameID, "op": "UI", pending: JSON.stringify(pending) }, "*");
                yield = false;
            }
        }
    }

    setInterval(function () {
        sendEventsNow();
    }, 20);

    var countUp = 0;

    function genUI() {
        countUp++;
        return countUp;
    }

    const UI = {
        _noBoiler: async function (data) {
            return new Promise((resolve, reject) => {
                UINum++;
                UIOps[UINum] = { resolve, reject };
                addToPost({ "op": "UI", content: { UINum, data } }, "*");
            });
        },
        win: {
            create: function (data) {
                const elID = genUI();
                const promise = UI._noBoiler({
                    type: "win",
                    elID,
                    attr: data
                });
                return { id: elID, promise }
            },
            titleBar: function (parent, data) {
                const elID = genUI();
                const promise = UI._noBoiler({
                    parent: parent.id,
                    type: "win_title",
                    elID,
                    attr: data
                });
                return { id: elID, promise }
            },
            content: function (parent, data) {
                const elID = genUI();
                const promise = UI._noBoiler({
                    parent: parent.id,
                    type: "win_content",
                    elID,
                    attr: data
                });
                return { id: elID, promise }
            }
        },
        div: function (parent, data) {
            const elID = genUI();
            const promise = UI._noBoiler({
                parent: parent.id,
                type: "div",
                elID,
                attr: data
            });

            return { id: elID, promise }
        },
        reset: async function (el) {
            await UI._noBoiler({
                id: el.id,
                type: "reset",
            });
        },
        button: function (parent, data) {
            const elID = genUI();
            const promise = UI._noBoiler({
                parent: parent.id,
                type: "button",
                elID,
                attr: data
            });
            return { id: elID, promise }
        },
        updateComponent: async function (element, data) {
            const promise = UI._noBoiler({
                id: element.id,
                parent: undefined,
                type: "update",
                attr: data,
            });
            return { promise }
        },
        listen: async function (element, data) {
            const listenID = genUI();
            const promise = UI._noBoiler({
                id: element.id,
                parent: undefined,
                type: "listen",
                elID: listenID,
                attr: {
                    "event": data.event
                },
            });

            eventListeners[listenID] = {
                "event": data.event,
                "callback": data.callback
            }

            function stopListening() {
                delete eventListeners[listenID];
            }

            return { id: listenID, promise, stopListening };
        }
    };

    window.addEventListener('message', (event) => {
        if (event.data.op === "FS") {
            const data = event.data.content;
            const promise = ops[data.opNum];
            if (!promise) return;
            promise.resolve(data.data);
            delete ops[data.opNum];
        } else if (event.data.op === "UI") {
            const pending = JSON.parse(event.data.pending);
            pending.forEach(pending => {
                const uiID = pending.content.UINum;
                const promise = UIOps[uiID];
                if (!promise) return;
                promise.resolve(pending.content.data);
                delete UIOps[uiID];
            })
        } else if (event.data.op === "UIEvent") {
            const pending = JSON.parse(event.data.pending);
            pending.forEach(pending => {
                const uiID = pending.content.UINum;
                const callback = eventListeners[pending.content.data.id];
                if (callback) {
                    callback.callback(pending.content.data);
                    // delete eventListeners[pending.content.data.id]
                }
            });
        } else if (event.data.op === "init") {
            frameID = event.data.uFrameID;
            console.log(frameID);
            (async function () {
                const initFS = await FS.init();
                if (initFS === false) {
                    document.body.innerHTML = `<h2>Browser unsupported</h2><p>Update your browser or download Chrome to use WebDesk.</p>`;
                } else {
                    console.log("<i> Sandbox init success!");
                    window.parent.postMessage({ "frameID": frameID, "op": "initDone" }, "*");
                }


                await FSTest.read("/system/sandbox/perm_test.txt");

                const this_is_stupid_asf = await FS.read("/apps/RenderTest.app/index.js");
                eval(this_is_stupid_asf.content);
            })();
        }
    });

    // FS written mainly by me, but fixed by Claude Haiku
    var debug = false;
    var opfsRoot, contents, handles, journalHandle, inodeHandle = undefined;
    const WFSVer = 1;

    function normalizePath(path) {
        if (!path) return '';
        return path.replace(/^\/+|\/+$/g, '').replace(/\/+/g, '/');
    }

    function ensureSlash(path) {
        if (!path) return '';
        path = normalizePath(path);
        if (path && !path.endsWith('/')) {
            path += '/';
        }
        return path;
    }

    const FSTest = {
        init: async function () {
            // Initialize filesystem and create if not existing already
            if (!navigator.storage) {
                return false;
            } else {
                opfsRoot = await navigator.storage.getDirectory();
                handles = await opfsRoot.getDirectoryHandle("handles", {
                    create: true,
                });
                contents = await opfsRoot.getDirectoryHandle("contents", {
                    create: true,
                });
                journalHandle = await opfsRoot.getDirectoryHandle("journal", {
                    create: true,
                });
                inodeHandle = await opfsRoot.getDirectoryHandle("inodes", {
                    create: true,
                });
                return true;
            }
        },
        handleJSON: function (uid, symlink) {
            const JSONObj = {
                "version": WFSVer,
                "uid": uid,
                "symlink": symlink,
            }
            return JSONObj;
        },
        writeHandleV1: async function (currentDir, filename, uid, isSymlink = false) {
            if (debug === true) console.log(currentDir + filename, uid, isSymlink);
            // Make handle's handle (LOL)
            const handlefileHandle = await currentDir.getFileHandle(filename, { create: true });
            const handleWritable = await handlefileHandle.createWritable();
            // Create file info to write
            const jsonHandled = FS.handleJSON(uid, isSymlink);
            // Write and close
            await handleWritable.write(JSON.stringify(jsonHandled));
            await handleWritable.close();
            if (debug === true) console.log("done");
        },
        ls: async function (data) {
            // Normalize path and chop it up
            const normalized = normalizePath(data.path);
            const result = normalized.split("/").filter(Boolean);

            // Walk through path segments. The last segment may be a file
            let currentDir = handles;

            for (let i = 0; i < result.length; i++) {
                const pathPart = result[i];

                if (i === result.length - 1) {
                    try {
                        if (data.noData === true) {
                            await currentDir.getFileHandle(pathPart);
                            return {
                                "kind": "file"
                            }
                        } else {
                            // Try to get as file first
                            let handleJSON;
                            async function parseHandle(noretry) {
                                const fileHandle = await currentDir.getFileHandle(pathPart);
                                const file = await fileHandle.getFile();
                                const fcont = await file.text();
                                try {
                                    handleJSON = JSON.parse(fcont);
                                } catch (error) {
                                    if (debug === true) console.log(error);
                                    if (noretry !== true) {
                                        if (debug === true) console.log("<!> The handle exists, it's probably version 0. Converting and trying again");
                                        await FSTest.writeHandleV1(currentDir, pathPart, fcont, false);
                                        if (debug === true) console.log("Retry")
                                        await parseHandle(true);
                                    } else {
                                        return false;
                                    }
                                }
                            }

                            await parseHandle();

                            if (debug === true) console.log(handleJSON);

                            const inode = await inodeHandle.getFileHandle(handleJSON.uid);
                            const mdata = await inode.getFile();
                            const mfile = JSON.parse(await mdata.text());

                            return {
                                "kind": "file",
                                "data": mfile,
                            }
                        }
                    } catch (err) {
                        // Not a file - try as directory
                    }
                }

                try {
                    currentDir = await currentDir.getDirectoryHandle(pathPart);
                } catch (err) {
                    return null;
                }
            }

            // Map contents of final directory out
            if (data.noData === true) {
                return {
                    "kind": "directory",
                };
            } else {
                // I barely understand Maps but I'm using them because it's the "right" thing to do
                const entries = new Map();
                for await (const entry of currentDir.values()) {
                    const entryPath = ensureSlash(data.path) + entry.name;
                    entries.set(entry.name, await FSTest.ls({ path: entryPath, noData: true }));
                }

                return {
                    "kind": "directory",
                    "data": entries,
                };
            }
        },
        read: async function (data) {
            try {
                const init = await FSTest.init();
                if (init === true) {
                    const ls = await FSTest.ls({ path: data.path });

                    if (!ls || ls.kind !== "file") {
                        console.error("File not found:", data.path);
                        return null;
                    }

                    const inode = ls.data;

                    const fileHandle = await contents.getFileHandle(inode.uid);
                    const file = await fileHandle.getFile();

                    const fcont = await file.text();
                    if (fcont === "FAIL!") {
                        console.log("<!!!> Something's wrong. Sandbox breach! " + fcont);
                        return false;
                    } else {
                        console.log("<i> Sandbox appears good");
                        return true;
                    }
                }
            } catch (error) {
                console.log(error);
            }
        }
    }
    FSTest.read();
</script>
