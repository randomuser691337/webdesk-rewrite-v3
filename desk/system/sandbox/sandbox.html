<script>
    const ops = {};
    let opNum = 0;

    const FS = {
        _noBoiler: async function (data) {
            return new Promise((resolve, reject) => {
                opNum++;
                ops[opNum] = { resolve, reject };
                window.parent.postMessage({ "op": "FS", content: { opNum, data } }, "*");
            });
        },
        init: async function () { return await FS._noBoiler({ opType: "init" }); },
        write: async function (path, content, type) { return await FS._noBoiler({ opType: "write", path, content, type }); },
        read: async function (path, content, type) { return await FS._noBoiler({ opType: "read", path }); },
        rm: async function (path, content, type) { return await FS._noBoiler({ opType: "rm", path }); },
        mkdir: async function (path) { return await FS._noBoiler({ opType: "mkdir", path }); },
        ls: async function (path) { return await FS._noBoiler({ opType: "ls", path }); }
    }

    const UIOps = {};
    let UINum = 0;
    let toPost = [];

    function addToPost(item) {
        toPost.push(item);
    }

    setInterval(function () {
        const pending = toPost;
        toPost = [];
        window.parent.postMessage({ "op": "UI", pending }, "*");
    }, 20);

    const UI = {
        _noBoiler: async function (data) {
            return new Promise((resolve, reject) => {
                UINum++;
                UIOps[UINum] = { resolve, reject };
                addToPost({ "op": "UI", content: { UINum, data }}, "*");
            });
        },
        win: async function (data) {
            return await UI._noBoiler({
                type: "win",
                attr: { title: data.title }
            });
        },
        view: async function (parent, data) {
            return await UI._noBoiler({
                parent: parent.id,
                type: "view",
                attr: {}
            });
        },
        button: async function (parent, data) {
            return await UI._noBoiler({
                parent: parent.id,
                type: "button",
                attr: {
                    "text": data.text
                }
            });
        },
        updateComponent: async function (element, data) {
            await UI._noBoiler({
                id: element.id,
                parent: undefined,
                type: "update",
                attr: data,
            });
        },
        listen: async function (element, data) {
            await UI._noBoiler({
                id: element.id,
                parent: undefined,
                type: "update",
                attr: {
                    "event": data.event
                },
            });

            // add code to resolve events
        }
    };

    window.addEventListener('message', (event) => {
        if (event.data.op === "FS") {
            const data = event.data.content;
            const promise = ops[data.opNum];
            if (!promise) return;
            promise.resolve(data.data);
        } else if (event.data.op === "UI") {
            const uiID = event.data.content.UINum;
            const promise = UIOps[uiID];
            if (!promise) return;
            promise.resolve(event.data.content.data);
        }
    });

    (async function () {
        const initFS = await FS.init();
        if (initFS === false) {
            document.body.innerHTML = `<h2>Browser unsupported</h2><p>Update your browser or download Chrome to use WebDesk.</p>`;

            console.log("<i> Sandbox init success!");
        }

        console.log(view);

            ct++;

        }

        console.timeEnd("UI buttons - sandbox");

        while (ct2 < 3000) {

            btn.innerText = "click me";
            document.body.appendChild(btn);
        }

        console.timeEnd("DOM buttons");
